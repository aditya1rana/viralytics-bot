version: '3.8'

services:
  bot:
    build: .
    container_name: viralytics-bot
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://viralytics:viralytics_secure_pw@db:5432/viralytics?schema=public
      - REDIS_URL=redis://cache:6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  db:
    image: postgres:16-alpine
    container_name: viralytics-db
    restart: always
    environment:
      POSTGRES_USER: viralytics
      POSTGRES_PASSWORD: viralytics_secure_pw
      POSTGRES_DB: viralytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viralytics -d viralytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: viralytics-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
